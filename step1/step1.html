<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro-Project Step 1</title>


    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>


<style>
    body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #ffd6ec, #e6ccff); /* baby pink → soft purple */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        color: #3b2d5f;
    }

    h1 {
        font-size: 42px;
        color: #5a2d82; /* deep purple */
        margin-bottom: 50px;
        text-align: center;
        letter-spacing: 1px;
    }

    .idea {
        background-color: rgba(255, 255, 255, 0.9);
        padding: 30px 25px;
        margin-bottom: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(123, 63, 160, 0.15);
        max-width: 800px;
        width: 100%;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .idea:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(123, 63, 160, 0.25);
    }

    h2 {
        font-size: 24px;
        margin-bottom: 15px;
        color: #7b3fa0;
    }

    p {
        font-size: 16px;
        line-height: 1.6;
        margin: 5px 0;
    }

    .label {
        font-weight: bold;
        color: #5a2d82;
    }

    a.nav-link {
        margin-top: 40px;
        font-size: 18px;
        text-decoration: none;
        color: #7b3fa0;
        background-color: white;
        padding: 12px 25px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(123, 63, 160, 0.15);
        transition: all 0.3s ease;
    }

    a.nav-link:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(123, 63, 160, 0.25);
        background-color: #f3e6ff;
    }

    /* Image styling */
    .idea img {
        max-width: 100%;
        border-radius: 15px;
        margin-bottom: 20px;
        box-shadow: 0 8px 20px rgba(123, 63, 160, 0.1);
    }
</style>

</head>
<body>

<h1>Micro-Project Step 1</h1>


<!-- Navigation back to main sketchbook -->
<a href="../index.html" class="nav-link">Back to Sketchbook</a>

 <script src="js/step1.js"></script>

</body>
</html>
